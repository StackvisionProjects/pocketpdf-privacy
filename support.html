<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PocketPDF - Support</title>

  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --accent: #2563eb;
      --border: #e2e8f0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      padding: 40px 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      border-radius: 20px;
      padding: 48px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      border: 1px solid var(--border);
      text-align: center;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 12px;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 40px;
      font-size: 18px;
    }

    .support-box {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      margin-top: 30px;
    }

    .email {
      font-size: 22px;
      font-weight: 600;
      margin-top: 12px;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .footer {
      margin-top: 50px;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 700px) {
      .card {
        padding: 28px;
      }

      h1 {
        font-size: 32px;
      }

      .email {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">

      <h1>PocketPDF Support</h1>

      <p class="subtitle">
        Need help, found a bug, or have suggestions?
        We’re here to help.
      </p>

      <div class="support-box">

        <p>
          Contact our support team anytime:
        </p>

        <p class="email">
          <a href="mailto:stackvision_desenvolvimento@hotmail.com">
            stackvision_desenvolvimento@hotmail.com
          </a>
        </p>

      </div>

      <div class="footer">
        © 2026 PocketPDF. All rights reserved.
      </div>

    </div>
  </div>
</body>
</html>
